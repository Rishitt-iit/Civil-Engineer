<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Paint Calculator</title>

<link rel="stylesheet"
href="../style.css">

</head>

<body>

<div class="main">

<h1>🎨 Paint Calculator</h1>

<input type="number"
id="area"
placeholder="Wall Area"
class="calc-input">

<button onclick="calculatePaint()"
class="calc-btn">

Calculate

</button>

<div id="result"
class="result-box">

Waiting For Input...

</div>

</div>


<script>

function calculatePaint(){

const area =
parseFloat(
document.getElementById(
"area"
).value
);

const paint =
area/10;

document.getElementById(
"result"
).innerHTML =

`
<h2>Paint Result 😎🔥</h2>

<p>
Paint Required:
${paint.toFixed(2)} Litres
</p>
`;

}

</script>

</body>
</html>
