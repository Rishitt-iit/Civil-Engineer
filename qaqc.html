<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA QC Checklist</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="main" style="margin-left:0;width:100%;padding:40px;">

<h1 style="margin-bottom:30px;">QA/QC Site Checklist</h1>

<div class="cards">

  <div class="card">
    <h3>Concrete Work</h3>
    <ul>
      <li>✔ Slump Test</li>
      <li>✔ Cube Test</li>
      <li>✔ Proper Curing</li>
    </ul>
  </div>

  <div class="card">
    <h3>Steel Reinforcement</h3>
    <ul>
      <li>✔ Proper Spacing</li>
      <li>✔ Cover Blocks</li>
      <li>✔ Binding Check</li>
    </ul>
  </div>

  <div class="card">
    <h3>Brickwork</h3>
    <ul>
      <li>✔ Alignment</li>
      <li>✔ Water Soaking</li>
      <li>✔ Joint Thickness</li>
    </ul>
  </div>

</div>

</div>

</body>
</html>
