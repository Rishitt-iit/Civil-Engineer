<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet"
href="../style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

<h2>CE Toolkit</h2>

</div>

<ul>

<li>

<a href="../index.html">

<i class="fas fa-chart-line"></i>

<span>Dashboard</span>

</a>

</li>

<li class="active">

<a href="#">

<i class="fas fa-user"></i>

<span>Profile</span>

</a>

</li>

</ul>

</div>



<!-- MAIN -->

<div class="main">


<div class="profile-card">


<img src="https://i.pravatar.cc/200"
id="profile-pic"
alt="profile">


<input type="file"
id="upload-pic"
accept="image/*"
style="margin-top:20px;">


<h2 id="profile-email">

Loading...

</h2>


<p style="margin-bottom:25px;">

Civil Engineering User

</p>



<!-- NAME -->

<input type="text"
id="name"
placeholder="Full Name"
class="calc-input">


<!-- PHONE -->

<input type="text"
id="phone"
placeholder="Phone Number"
class="calc-input">


<!-- CITY -->

<input type="text"
id="city"
placeholder="City"
class="calc-input">


<!-- COLLEGE -->

<input type="text"
id="college"
placeholder="College / Company"
class="calc-input">


<!-- BIO -->

<textarea
id="bio"
placeholder="Write About Yourself..."
class="calc-input"
style="
height:120px;
resize:none;
"></textarea>



<!-- SAVE -->

<button onclick="saveProfile()"
class="calc-btn">

Save Profile

</button>



<!-- LOGOUT -->

<button onclick="logoutUser()"
class="logout-btn">

Logout

</button>


</div>

</div>



<script>


/* =========================
   LOAD EMAIL
========================= */

const user =
localStorage.getItem("ce_user");

document.getElementById(
"profile-email"
).innerText = user;



/* =========================
   SAVE PROFILE
========================= */

function saveProfile(){

const profileData = {

name:
document.getElementById("name").value,

phone:
document.getElementById("phone").value,

city:
document.getElementById("city").value,

college:
document.getElementById("college").value,

bio:
document.getElementById("bio").value

};



localStorage.setItem(

"profileData",

JSON.stringify(profileData)

);



alert("Profile Saved 😎🔥");

}



/* =========================
   LOAD PROFILE
========================= */

const savedProfile =

JSON.parse(

localStorage.getItem("profileData")

);



if(savedProfile){

document.getElementById("name").value =
savedProfile.name || "";

document.getElementById("phone").value =
savedProfile.phone || "";

document.getElementById("city").value =
savedProfile.city || "";

document.getElementById("college").value =
savedProfile.college || "";

document.getElementById("bio").value =
savedProfile.bio || "";

}



/* =========================
   PROFILE IMAGE
========================= */

const uploadPic =
document.getElementById("upload-pic");

uploadPic.addEventListener(
"change",
function(){

const reader =
new FileReader();

reader.onload = function(e){

const imageData =
e.target.result;

document.getElementById(
"profile-pic"
).src = imageData;



localStorage.setItem(
"profileImage",
imageData
);

};

reader.readAsDataURL(
this.files[0]
);

});



const savedImage =
localStorage.getItem(
"profileImage"
);

if(savedImage){

document.getElementById(
"profile-pic"
).src = savedImage;

}



/* =========================
   LOGOUT
========================= */

function logoutUser(){

localStorage.removeItem(
"ce_user"
);

window.location.href =
"login.html";

}

</script>

</body>

</html>
